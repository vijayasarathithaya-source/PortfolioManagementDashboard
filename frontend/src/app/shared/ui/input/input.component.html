<mat-form-field appearance="outline" class="app-input-field">
  @if (label()) {
    <mat-label>{{ label() }}</mat-label>
  }
  
  @if (icon()) {
    <mat-icon matPrefix class="input-prefix-icon">{{ icon() }}</mat-icon>
  }

  <input
    matInput
    [type]="type() === 'password' ? (hidePassword() ? 'password' : 'text') : type()"
    [placeholder]="placeholder()"
    [formControl]="control()"
    (input)="onInput($event)"
    (blur)="onTouched()"
  />

  @if (type() === 'password') {
    <button
      type="button"
      mat-icon-button
      matSuffix
      (click)="togglePasswordVisibility($event)"
      class="password-toggle-btn"
      aria-label="Toggle password visibility"
    >
      <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
  }

  @if (hint()) {
    <mat-hint>{{ hint() }}</mat-hint>
  }

  @if (errorMsg() || (control() && control().invalid && control().touched)) {
    <mat-error>
      {{ errorMsg() || 'This field is required or invalid' }}
    </mat-error>
  }
</mat-form-field>
