<div class="auth-page-container">
  <div class="auth-card-wrapper">
    <div class="auth-brand">
      <span class="material-icons brand-icon">donut_large</span>
      <h1 class="brand-title">Portfolio Management</h1>
    </div>
    <app-card title="Sign In" subtitle="Welcome back! Please login to your portfolio.">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form" autocomplete="off">
        
        @if (errorMessage()) {
          <div class="error-alert animate-fade-in">
            {{ errorMessage() }}
          </div>
        }

        <app-input
          label="Email Address"
          placeholder="e.g. investor@example.com"
          type="email"
          icon="email"
          [control]="$any(loginForm.controls.email)"
          formControlName="email"
          autocomplete="new-password"
          errorMsg="Please enter a valid email address"
        ></app-input>

        <app-input
          label="Password"
          placeholder="••••••••"
          type="password"
          icon="lock"
          [control]="$any(loginForm.controls.password)"
          formControlName="password"
          autocomplete="new-password"
          errorMsg="Password must be at least 6 characters"
        ></app-input>

        <div class="remember-me-container" style="margin-bottom: 24px; display: flex; justify-content: flex-start;">
          <mat-checkbox formControlName="rememberMe" color="primary">Remember me</mat-checkbox>
        </div>

        <div class="form-actions">
          <app-button
            type="submit"
            variant="raised"
            color="primary"
            [loading]="loading()"
            label="Sign In"
          ></app-button>
        </div>

        <div class="auth-footer">
          <p>Don't have an account? <a routerLink="/auth/register">Create one here</a></p>
        </div>
      </form>
    </app-card>
  </div>
</div>
